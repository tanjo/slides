<!DOCTYPE html>
<html>
  <head>
    <title>怖くない GitHub 入門講座</title>
    <meta charset="utf-8">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
      body { font-family: 'Noto Sans JP', sans-serif; }
      h1, h2, h3 { font-weight: bold; color: #24292e; }
      .remark-slide-content { font-size: 24px; padding: 1em 4em; }
      .remark-code, .remark-inline-code { font-family: 'Ubuntu Mono', monospace; background: #f6f8fa; }
      .inverse { background: #24292e; color: #ffffff; }
      .inverse h1, .inverse h2 { color: #ffffff; }
      .footnote { position: absolute; bottom: 12px; left: 20px; font-size: 0.7em; }
      /* 強調用 */
      .red { color: #fa5252; }
      .blue { color: #228be6; }
      img { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <textarea id="source">
      </textarea>
    <script src="https://remarkjs.com/downloads/remark-latest.min.js"></script>
    <script>
      var slideshow = remark.create({
        sourceUrl: 'README.md',
        highlightStyle: 'github',
        highlightLines: true,
        countIncrementalSlides: false
      });
    </script>
  </body>
</html>
